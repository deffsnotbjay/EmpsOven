<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rider Login - EmpsOven</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Manrope', sans-serif;
        }

        body {
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-container h1 {
            color: #1a1a1a;
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .login-container p {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .google-signin-btn {
            width: 100%;
            padding: 12px;
            background-color: #ffffff;
            color: #333;
            border: 1px solid #e1e4e8;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .google-signin-btn:hover {
            background-color: #f8f9fa;
            border-color: #d1d5db;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .google-icon {
            width: 20px;
            height: 20px;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
            color: #999;
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e1e4e8;
        }

        .divider span {
            padding: 0 15px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e1e4e8;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #285742;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: #333;
        }

        .error-message {
            color: #ef4444;
            font-size: 14px;
            margin-top: 15px;
            display: none;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 1px solid #e1e4e8;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            font-size: 16px;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #285742;
            border-bottom-color: #285742;
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            body {
                padding: 20px;
                align-items: flex-start;
                padding-top: 15vh;
            }

            .login-container {
                padding: 30px 20px;
                border-radius: 12px;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            }

            .login-container h1 {
                font-size: 20px;
            }

            .login-container p {
                font-size: 13px;
                margin-bottom: 20px;
            }

            .form-group input {
                padding: 10px 14px;
                font-size: 14px;
            }

            .btn-login {
                padding: 10px;
                font-size: 15px;
            }
        }
    </style>
</head>

<body>

    <div class="login-container">
        <h1>Rider Portal</h1>
        <p>Sign in to view your assigned deliveries</p>

        <!-- Google Sign-In Button -->
        <button type="button" class="google-signin-btn" id="googleSignInBtn" onclick="handleGoogleSignIn()">
            <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                    fill="#4285F4" />
                <path
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                    fill="#34A853" />
                <path
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                    fill="#FBBC05" />
                <path
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                    fill="#EA4335" />
            </svg>
            Continue with Google
        </button>

        <div class="divider">
            <span>OR</span>
        </div>

        <div class="auth-tabs">
            <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
            <button class="tab-btn" id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
            <div id="errorMsg" class="error-message">Invalid username or password</div>
        </form>

        <form id="signupForm" style="display: none;">
            <div class="form-group">
                <label for="signupName">Full Name</label>
                <input type="text" id="signupName" placeholder="Enter full name" required>
            </div>
            <div class="form-group">
                <label for="signupUsername">Username</label>
                <input type="text" id="signupUsername" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label for="signupPassword">Password</label>
                <input type="password" id="signupPassword" placeholder="Create a password" required>
            </div>
            <button type="submit" class="btn-login" id="signupBtn">Sign Up</button>
            <div id="signupErrorMsg" class="error-message">Failed to create account</div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Initialize Supabase client
        const SUPABASE_URL = 'https://kkkildlldjhttipywybz.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtra2lsZGxsZGpodHRpcHl3eWJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NDA5OTcsImV4cCI6MjA4NzQxNjk5N30.1XFow3JeDfxan06H5c925a5xj-LSoNY0HijEvWuZpLg';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function switchTab(tab) {
            document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';

            document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
            document.getElementById('tabSignup').classList.toggle('active', tab === 'signup');
        }

        // Handle Google Sign-In
        async function handleGoogleSignIn() {
            const googleBtn = document.getElementById('googleSignInBtn');
            googleBtn.disabled = true;
            googleBtn.textContent = 'Redirecting to Google...';

            try {
                const { data, error } = await supabaseClient.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.origin + '/rider-login.html',
                        queryParams: {
                            access_type: 'offline',
                            prompt: 'consent'
                        }
                    }
                });

                if (error) throw error;

            } catch (error) {
                console.error('Google sign-in error:', error);
                const errorMsg = document.getElementById('errorMsg');
                errorMsg.textContent = 'Google sign-in failed. Please try again.';
                errorMsg.style.display = 'block';
                googleBtn.disabled = false;
                googleBtn.innerHTML = `
                    <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Continue with Google
                `;
            }
        }

        // Check if already logged in or returning from OAuth
        document.addEventListener('DOMContentLoaded', async () => {
            // Check for OAuth callback
            const { data: { session } } = await supabaseClient.auth.getSession();

            if (session) {
                // Sync Google session with our backend to get standard JWT token
                try {
                    const res = await fetch('/api/rider/google-login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ access_token: session.access_token })
                    });

                    const data = await res.json();
                    if (res.ok) {
                        sessionStorage.setItem('riderToken', data.token);
                        sessionStorage.setItem('riderName', data.rider.name);
                        sessionStorage.setItem('riderAvailable', data.rider.is_available);
                        sessionStorage.setItem('riderAuthType', 'traditional'); // Uses standard token now
                        window.location.href = '/rider.html';
                        return;
                    } else {
                        throw new Error(data.message || 'Google sync failed');
                    }
                } catch (err) {
                    console.error('Backend Google auth failed:', err);
                    await supabaseClient.auth.signOut();
                    const errorMsg = document.getElementById('errorMsg');
                    errorMsg.textContent = 'Google Auth syncing failed. Please try again.';
                    errorMsg.style.display = 'block';
                    return;
                }
            }

            // Check for traditional token-based auth
            const token = sessionStorage.getItem('riderToken');
            if (token) {
                try {
                    const res = await fetch('/api/rider/verify', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) {
                        window.location.href = '/rider.html';
                    } else {
                        sessionStorage.removeItem('riderToken');
                    }
                } catch (err) {
                    sessionStorage.removeItem('riderToken');
                }
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');

            btn.textContent = 'Signing in...';
            btn.disabled = true;
            errorMsg.style.display = 'none';

            try {
                const response = await fetch('/api/rider/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    sessionStorage.setItem('riderToken', data.token);
                    sessionStorage.setItem('riderName', data.rider.name);
                    sessionStorage.setItem('riderAvailable', data.rider.is_available);
                    sessionStorage.setItem('riderAuthType', 'traditional');
                    window.location.href = '/rider.html';
                } else {
                    errorMsg.textContent = data.message || 'Login failed';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Network error. Please try again.';
                errorMsg.style.display = 'block';
            } finally {
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }
        });

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('signupName').value;
            const username = document.getElementById('signupUsername').value;
            const password = document.getElementById('signupPassword').value;
            const btn = document.getElementById('signupBtn');
            const errorMsg = document.getElementById('signupErrorMsg');

            btn.textContent = 'Signing up...';
            btn.disabled = true;
            errorMsg.style.display = 'none';

            try {
                const response = await fetch('/api/rider/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    sessionStorage.setItem('riderToken', data.token);
                    sessionStorage.setItem('riderName', data.rider.name);
                    sessionStorage.setItem('riderAvailable', data.rider.is_available);
                    sessionStorage.setItem('riderAuthType', 'traditional');
                    window.location.href = '/rider.html';
                } else {
                    errorMsg.textContent = data.message || 'Signup failed';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Network error. Please try again.';
                errorMsg.style.display = 'block';
            } finally {
                btn.textContent = 'Sign Up';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
